services:
  leisaac-debug:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: leisaac-server:latest
    container_name: leisaac-server
    runtime: nvidia
    network_mode: host
    # ports:
    #   - "8011:8011/tcp"
    #   - "48010:48010/tcp"
    #   - "49100:49100/tcp"
    #   - 47998-48020:47998-48020/udp"
    ipc: host
    stdin_open: true
    tty: true
    working_dir: /workspace/repo
    environment:
      LEISAAC_ASSETS_ROOT: /workspace/repo/assets
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    volumes:
      - ..:/workspace/repo
      # - /etc/vulkan/icd.d:/etc/vulkan/icd.d:ro # Windows의 경우 비활성화
    ulimits:
      memlock: -1
      stack: 67108864
    command:
      - uv
      - run
      - scripts/environments/teleoperation/teleop_se3_agent.py
      - --task=LeIsaac-SO101-PickOrange-v0
      - --teleop_device=so101leader
      # - --remote_endpoint=tcp://10.10.40.254:5556
      - --remote_endpoint=tcp://host.docker.internal:5556 # Window 호스트의 경우
      - --num_envs=1
      - --device=cuda
      # LeIsaac 태스크 config에 카메라 prim이 포함되어 있어 --enable_cameras 필수.
      # H100/A100 등 RT 코어 없는 GPU에서는 카메라 sensor가 raytracing pipeline
      # 생성에 실패하여 task 실행 불가 → RT 코어 있는 GPU 환경에서만 운영.
      # docker setup 검증 / Windows+A4000 으로 이전 후 실행.
      - --enable_cameras
      - --headless
      - --livestream=2

  gr00t-train:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gr00t
    image: leisaac-gr00t:latest
    container_name: leisaac-gr00t
    runtime: nvidia
    network_mode: host          # leisaac-debug 와 ZMQ 통신을 host 네트워크로 묶기 위함
    ipc: host
    stdin_open: true
    tty: true
    working_dir: /workspace/repo/Isaac-GR00T
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      WANDB_API_KEY: ${WANDB_API_KEY:-}
      # uv run 시 aarch64 LFS wheel 검증 시도를 막기 위해 sync check 건너뜀.
      # (볼륨 마운트 후 wheels/*.whl이 LFS 포인터라 zip 파싱 실패하는 문제 회피)
      UV_NO_SYNC: "1"
      # uv sync --no-install-project 이므로 gr00t 패키지 자체는 venv에 미설치.
      # python이 import gr00t 를 찾을 수 있도록 소스 경로를 직접 지정.
      PYTHONPATH: /workspace/repo/Isaac-GR00T
    volumes:
      - ..:/workspace/repo
    ulimits:
      memlock: -1
      stack: 67108864
    shm_size: "32gb"
    command: ["bash"]            # 학습/추론 시 docker compose run 으로 별도 명령 주입

  smolvla-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.smolvla
    image: leisaac-smolvla:latest
    container_name: leisaac-smolvla
    runtime: nvidia
    network_mode: host          # leisaac-debug 와 HTTP(8080) 통신을 host 네트워크로 묶기 위함
    ipc: host
    stdin_open: true
    tty: true
    working_dir: /workspace/repo
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      WANDB_API_KEY: ${WANDB_API_KEY:-}
    volumes:
      - ..:/workspace/repo
    ulimits:
      memlock: -1
      stack: 67108864
    shm_size: "16gb"
    command: ["bash"]            # 학습/추론 시 docker compose run 으로 별도 명령 주입
