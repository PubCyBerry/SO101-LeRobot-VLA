name: VLA-pipeline

services:
  # ── LeRobot container ─────────────────────────────────────────────────
  # ■ Windows 11 사전 작업 (USB 장치 포워딩)
  # ─────────────────────────────────────────
  #   1. usbipd-win 설치 (winget install usbipd)
  #   2. PowerShell (관리자):
  #        usbipd list                           # VID:PID 확인
  #        usbipd bind   --busid <LEADER_BUS>
  #        usbipd bind   --busid <FOLLOWER_BUS>
  #        usbipd attach --wsl --busid <LEADER_BUS>
  #        usbipd attach --wsl --busid <FOLLOWER_BUS>
  #   3. WSL2 쪽에서 확인: ls /dev/ttyUSB*
  #   4. .env 파일에 LEADER_PORT / FOLLOWER_PORT 경로 기입
  #
  # ■ 실행 - working directory에서:
  #   docker compose --env-file .env -f docker/docker-compose.yaml up lerobot
  lerobot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.lerobot
      # Buildkit 병렬 레이어 빌드 활성화
      args:
        BUILDKT_INLINE_CACHE: "1"
    image: lerobot-so101:0.4.4
    container_name: so101_lerobot
    restart: "no"
    # ── 사용자 매핑 ────────────────────────────────────────────────────────
    # 호스트 UID/GID 로 실행 → bind-mount 된 datasets/logs/outputs 의 파일이
    # 호스트 유저 소유로 생성된다. PyAV 가 mp4 를 0600 으로 만드는 문제도
    # ownership 측면에서 해결 (소유자가 곧 호스트 유저).
    # UID 는 bash 가 자동 설정하지만 GID 는 export 되지 않으므로 1000 fallback.
    user: "${UID:-1000}:${GID:-1000}"
    # ── 그룹 추가 ──────────────────────────────────────────────────────────
    # /dev/ttyACM* (dialout, GID 20), /dev/video* (video, GID 44) 접근 권한.
    # privileged:true 는 CAP_DAC_OVERRIDE 를 주지만 non-root UID 에는 DAC
    # 우회 효과가 없으므로 group_add 로 명시. Ubuntu/Debian 표준 GID 사용.
    group_add:
      - "20"   # dialout
      - "44"   # video
    # ── GPU ────────────────────────────────────────────────────────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # ── 디바이스 마운트 ────────────────────────────────────────────────────
    #
    # [Arm 직렬 포트]
    #   ttyACM* : CH343 칩이 cdc_acm 드라이버로 잡힌 경로
    #
    # [카메라]
    #   UVC 카메라는 캡처 노드(짝수)와 메타데이터 노드(홀수) 쌍으로 존재.
    #   OpenCV 는 캡처 노드만 사용하지만, UVC 드라이버가 메타데이터 노드도
    #   함께 열려 있어야 정상 스트리밍되는 경우가 있어 둘 다 마운트.
    #
    #   belly cam  → /dev/video0 (캡처), /dev/video1 (메타)  — 전면부 시점
    #   wrist cam  → /dev/video2 (캡처), /dev/video3 (메타)  — 손목 시점
    #   top   cam  → /dev/video4 (캡처), /dev/video5 (메타)  — 탑뷰 시점 (선택)
    #
    #   실제 활성 카메라는 .env 의 ENABLED_CAMERAS 가 결정 (entrypoint 가 JSON 빌드).
    #   사용하지 않는 카메라는 .env 에서 해당 *_CAM_PORT 를 비워두면 /dev/null 폴백
    #   마운트 (privileged 컨테이너에서 무해).
    #
    devices:
      # Arm 직렬 포트
      - "${TELEOP_PORT}:${TELEOP_PORT}"                                              # /dev/ttyACM0
      - "${ROBOT_PORT}:${ROBOT_PORT}"                                                # /dev/ttyACM1
      # belly cam (전면부 시점)
      - "${BELLY_CAM_PORT:-/dev/null}:${BELLY_CAM_PORT:-/dev/null}"                  # /dev/video0
      - "${BELLY_CAM_META_PORT:-/dev/null}:${BELLY_CAM_META_PORT:-/dev/null}"        # /dev/video1
      # wrist cam (손목 시점)
      - "${WRIST_CAM_PORT:-/dev/null}:${WRIST_CAM_PORT:-/dev/null}"                  # /dev/video2
      - "${WRIST_CAM_META_PORT:-/dev/null}:${WRIST_CAM_META_PORT:-/dev/null}"        # /dev/video3
      # top cam (탑뷰 시점, 선택)
      - "${TOP_CAM_PORT:-/dev/null}:${TOP_CAM_PORT:-/dev/null}"                      # /dev/video4
      - "${TOP_CAM_META_PORT:-/dev/null}:${TOP_CAM_META_PORT:-/dev/null}"            # /dev/video5

    # udev 접근 & USB 권한에 필요 (개발/테스트 용도)
    privileged: true
    # ── 볼륨 ───────────────────────────────────────────────────────────────
    volumes:
      # 녹화 데이터 & 로그를 호스트와 공유
      - ../datasets:/workspace/datasets
      - ../logs:/workspace/logs
      - ../outputs:/workspace/outputs
      # HuggingFace 캐시: 명명 볼륨 `lerobot_hf_cache` (호스트 측 디렉터리는 docker
      # 가 관리). 컨테이너 재생성 후에도 캐시가 유지되고, 두 서비스가 동일 볼륨을
      # 공유하므로 한 번 받은 모델을 양쪽이 모두 사용한다.
      # 경로를 /root/.cache → /workspace/.cache 로 옮긴 이유: 컨테이너를 호스트
      # UID 로 실행하면 non-root 가 /root 디렉터리에 들어갈 수 없기 때문.
      - hf_cache:/workspace/.cache/huggingface
      # X11 소켓 — pynput 키보드 리스너 (record/teleop 의 에피소드 제어).
      # WSLg 는 호스트 측에 /tmp/.X11-unix/X0 (mode 0777) 을 노출하므로
      # xhost 추가 설정 없이 그대로 마운트 가능. 네이티브 Linux 데스크탑에서는
      # 사전에 `xhost +SI:localuser:root` 가 필요할 수 있음.
      - /tmp/.X11-unix:/tmp/.X11-unix
    # ── 환경 변수 ──────────────────────────────────────────────────────────
    # `.env` 값은 env_file 로만 주입한다. 셸 환경의 동명 변수가 docker compose
    # 의 ${VAR} 보간을 가로채는 일을 피하기 위해 `environment:` 에는 .env 와
    # 무관한 compose-전용 키만 둔다. 모든 런타임 기본값은 teleop-entrypoint.sh
    # 의 `${VAR:-default}` 블록(라인 37-95)에서 채워진다.
    env_file:
      - ../.env
    environment:
      NVIDIA_VISIBLE_DEVICES:     all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
      # pynput 가 X 서버에 접속할 수 있도록 호스트 DISPLAY 전달.
      # WSLg: 호스트 DISPLAY=:0, /tmp/.X11-unix/X0 소켓이 자동 노출됨.
      DISPLAY: ${DISPLAY:-:0}
      # ── Rerun publish 튜닝 ────────────────────────────────────────────
      # lerobot.utils.visualization_utils.init_rerun 의 기본 flush 단위는
      # 8 KB 라 카메라 frame (JPEG ~50 KB) 마다 6+ 회 flush → gRPC publish
      # 빈도가 stutter 를 유발한다. 128 KB 로 키워 frame 1-2 장 단위로 묶어
      # publish 함으로써 host.docker.internal 네트워크 round-trip 감소.
      # 환경변수 미설정 시 lerobot 가 init_rerun 안에서 다시 8000 으로
      # set 하므로 (line 39 fallback) 여기서 명시적으로 주입한다.
      RERUN_FLUSH_NUM_BYTES: "131072"
    # ── 네트워크 ───────────────────────────────────────────────────────────
    network_mode: host   # 카메라 스트림·ROS 브릿지 등 외부 연결 시 편의

    # ── 기본 명령 오버라이드 ───────────────────────────────────────────────
    # ENTRYPOINT=entrypoint.sh + CMD=teleop 이 기본값;
    # 아래 주석을 해제하면 직접 명령 실행 가능
    # command: teleop

    # ── 헬스체크 ───────────────────────────────────────────────────────────
    # teleoperation 자체는 장시간 실행 프로세스이므로 간단한 python import 확인
    healthcheck:
      test: ["CMD", "python", "-c", "import lerobot; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    ipc: host
    stdin_open: true
    tty: true

  # ── LeRobot Async Inference Policy Server ──────────────────────────────
  # gRPC :8080 서버. 모델 weight 는 클라이언트가 SendPolicyInstructions RPC 로
  # 주입(policy-agnostic). 같은 호스트의 robot_client / record 가 127.0.0.1:8080
  # 으로 접속한다. 추후 Linux H100 서버에 띄우고 Windows 워크스테이션에서 원격
  # 추론하는 구조도 동일한 이미지로 지원할 예정.
  #
  # ■ 이미지 분리 (Dockerfile.smolvla)
  #   lerobot 서비스(Dockerfile.lerobot, teleop deps) 와 별도 이미지로 빌드한다.
  #   smolvla / async dependency-groups + transformers + grpcio 를 설치하고,
  #   USB / serial / speech 패키지는 제거. 향후 GR00T 의 flash-attn 같은
  #   추론 의존성은 이 이미지에만 추가하므로 teleop 안정성이 격리된다.
  #
  # ■ 빌드
  #   docker compose -f docker/docker-compose.yaml build lerobot-policy-server
  #
  # ■ 실행
  #   docker compose --env-file .env -f docker/docker-compose.yaml \
  #     up -d lerobot-policy-server
  #
  # ■ 클라이언트 예시 (같은 호스트의 lerobot 컨테이너 안에서)
  #   docker compose --env-file .env -f docker/docker-compose.yaml \
  #     run --rm lerobot bash -c "
  #       python -m lerobot.async_inference.robot_client \
  #         --server_address=127.0.0.1:8080 \
  #         --policy_type=smolvla \
  #         --pretrained_name_or_path=lerobot/smolvla_base \
  #         --policy_device=cuda \
  #         --robot.type=so101_follower --robot.port=\${ROBOT_PORT} \
  #         --task='pick the pen' --actions_per_chunk=50 \
  #         --chunk_size_threshold=0.5
  #     "
  lerobot-policy-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.smolvla
      args:
        BUILDKT_INLINE_CACHE: "1"
    image: lerobot-policy-server:0.4.4
    container_name: so101_policy_server
    restart: "no"
    # ── 사용자 매핑 ────────────────────────────────────────────────────────
    # lerobot 서비스와 동일하게 호스트 UID/GID 로 실행. train/eval 의 outputs/
    # 도 호스트 유저 소유로 생성된다.
    user: "${UID:-1000}:${GID:-1000}"
    # ── GPU (SmolVLA 추론) ────────────────────────────────────────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # ── 볼륨 ─────────────────────────────────────────────────────────────
    # USB / 카메라 디바이스 마운트는 제외 (추론 전용, 로봇 직결 안 함).
    # datasets 는 train 모드에서 SO-101 수집 데이터를 읽기 위해 lerobot 서비스와
    # 동일 경로를 공유한다.
    volumes:
      - ../datasets:/workspace/datasets
      - ../logs:/workspace/logs
      - ../outputs:/workspace/outputs
      # HuggingFace 캐시: lerobot 서비스와 동일한 명명 볼륨 공유.
      # prepare-model 모드로 받은 가중치를 양쪽 서비스가 그대로 읽어 들인다.
      - hf_cache:/workspace/.cache/huggingface
    # ── 환경 변수 ────────────────────────────────────────────────────────
    env_file:
      - ../.env
    environment:
      NVIDIA_VISIBLE_DEVICES:     all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
    # ── 네트워크 ─────────────────────────────────────────────────────────
    # host 모드: 동일 호스트의 robot_client / record 가 127.0.0.1:POLICY_SERVER_PORT
    # 로 직접 접속. 외부 노출이 필요 없으면 호스트 방화벽에서 해당 포트 차단 권장
    # (CVE-2026-25874: pickle deserialization RCE).
    network_mode: host

    # ── 기본 명령 ────────────────────────────────────────────────────────
    # entrypoint.sh policy-server 분기 호출
    command: ["policy-server"]

    # ── 헬스체크 ─────────────────────────────────────────────────────────
    # async_inference 모듈 import 만 확인 (gRPC 포트는 모델 로드 후 LISTEN)
    healthcheck:
      test: ["CMD", "python", "-c", "import lerobot.async_inference.policy_server"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ipc: host
    stdin_open: true
    tty: true

# ── 공유 볼륨 ──────────────────────────────────────────────────────────────
volumes:
  hf_cache:
    name: lerobot_hf_cache   # 컨테이너 재생성 후에도 HF 캐시 유지